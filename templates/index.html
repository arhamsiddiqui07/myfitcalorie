<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05060e;--c2:#0c0f1d;--c3:#111526;
  --b1:#1a2038;--b2:#242d4a;
  --or:#ff5c1a;--org:rgba(255,92,26,.14);--orgg:rgba(255,92,26,.28);
  --bl:#4d8fff;--blg:rgba(77,143,255,.14);
  --gr:#00d68f;--grg:rgba(0,214,143,.14);
  --ye:#ffbe0b;--yeg:rgba(255,190,11,.14);
  --re:#ff3d6b;--reg:rgba(255,61,107,.14);
  --pu:#a855f7;--pug:rgba(168,85,247,.14);
  --tx:#f0f2ff;--tx2:#7a86a0;--tx3:#38445a;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

/* BG */
.bg-wrap{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px)}
.o1{width:700px;height:700px;background:radial-gradient(circle,rgba(255,92,26,.09),transparent 70%);top:-250px;right:-180px;animation:fl1 16s ease-in-out infinite}
.o2{width:550px;height:550px;background:radial-gradient(circle,rgba(77,143,255,.07),transparent 70%);bottom:-180px;left:-180px;animation:fl2 21s ease-in-out infinite}
.o3{width:350px;height:350px;background:radial-gradient(circle,rgba(0,214,143,.05),transparent 70%);top:42%;left:32%;animation:fl3 27s ease-in-out infinite}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.011) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.011) 1px,transparent 1px);background-size:56px 56px}
@keyframes fl1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-44px,32px) scale(1.09)}}
@keyframes fl2{0%,100%{transform:translate(0,0)}50%{transform:translate(36px,-44px) scale(1.07)}}
@keyframes fl3{0%,100%{transform:translate(0,0)}50%{transform:translate(-28px,32px)}}

/* LAYOUT */
.page{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:56px 18px 100px}

/* HEADER */
.hdr{text-align:center;margin-bottom:52px;animation:up .8s cubic-bezier(.16,1,.3,1) both}
.hdr-pill{display:inline-flex;align-items:center;gap:7px;padding:5px 16px;border-radius:999px;border:1px solid var(--b2);background:var(--c2);font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--tx2);margin-bottom:20px}
.hdr-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--or);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.hdr h1{font-family:'Outfit',sans-serif;font-size:clamp(50px,11vw,96px);font-weight:900;line-height:.92;letter-spacing:-4px;margin-bottom:16px}
.fire{background:linear-gradient(135deg,#ff5c1a,#ffaa5c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(255,92,26,.4))}
.hdr p{font-size:15px;color:var(--tx2);line-height:1.65;max-width:390px;margin:0 auto}

/* NAV */
.nav{display:flex;gap:6px;margin-bottom:14px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px;animation:up .6s cubic-bezier(.16,1,.3,1) .07s both}.nav::-webkit-scrollbar{display:none}
.nav a{padding:10px 16px;border-radius:12px;font-size:13px;font-weight:600;color:var(--tx2);text-decoration:none;border:1px solid transparent;transition:all .2s;white-space:nowrap;flex-shrink:0}
.nav a:hover{color:var(--tx);border-color:var(--b1)}
.nav a.on{background:var(--c2);border-color:var(--b2);color:var(--or)}

/* GLASS */
.glass{background:linear-gradient(145deg,rgba(255,255,255,.027),rgba(255,255,255,.008));border:1px solid var(--b1);border-radius:26px;position:relative;overflow:hidden}
.glass::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}

/* CARD */
.card{padding:38px;margin-bottom:14px;box-shadow:0 36px 90px rgba(0,0,0,.52);animation:up .65s cubic-bezier(.16,1,.3,1) .1s both}

/* SECTION LABEL */
.sec-plain{display:flex;align-items:center;gap:10px;margin-bottom:15px}
.sec-label{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--or);display:flex;align-items:center;gap:10px}
.sec-label::after{display:none}
.blk{margin-bottom:28px}

/* PILLS */
.pills{display:inline-flex;background:var(--c2);border:1px solid var(--b1);border-radius:13px;padding:4px;gap:3px;margin-bottom:14px;flex-wrap:wrap}
.pi input{display:none}
.pi label{display:block;padding:9px 20px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--tx2);transition:all .2s;white-space:nowrap}
.pi input:checked+label{background:var(--or);color:#fff;box-shadow:0 2px 16px var(--orgg)}

/* INPUTS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fi{display:flex;flex-direction:column;gap:7px}
.fi label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3)}
.iw{position:relative}
.iw .sf{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;font-weight:700;color:var(--tx3);pointer-events:none;font-family:'Space Grotesk',sans-serif}
input[type=number]{width:100%;background:var(--c2);border:1.5px solid var(--b1);border-radius:13px;color:var(--tx);font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;padding:14px 50px 14px 16px;outline:none;transition:all .2s}
input[type=number]:focus{border-color:var(--or);background:var(--c3);box-shadow:0 0 0 3px rgba(255,92,26,.1)}
.hide{display:none}.sg{display:grid}.sb{display:block}

/* OPTION CARDS */
.og2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.og3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.og6{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.op input{display:none}
.op label{display:flex;flex-direction:column;padding:15px 16px;background:var(--c2);border:1.5px solid var(--b1);border-radius:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.op label::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--org),transparent);opacity:0;transition:opacity .2s}
.op input:checked+label{border-color:var(--or);box-shadow:0 0 0 1px var(--or),0 6px 24px var(--org)}
.op input:checked+label::after{opacity:1}
.op label:hover{border-color:var(--b2)}
.oi{font-size:20px;margin-bottom:7px;position:relative;z-index:1}
.ot{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--tx);position:relative;z-index:1}
.os{font-size:11px;color:var(--tx2);margin-top:2px;position:relative;z-index:1}
.op input:checked+label .ot{color:var(--or)}
.gen .op label{align-items:center;text-align:center;padding:20px}
.gen .oi{font-size:30px;margin-bottom:10px}
.gen .ot{font-size:16px}
.gl .op label{align-items:center;text-align:center;padding:17px 8px}

/* SUBMIT */
.sbtn{width:100%;padding:19px;background:linear-gradient(135deg,var(--or),#df3f0e);border:none;border-radius:15px;font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:800;letter-spacing:.3px;color:#fff;cursor:pointer;transition:all .24s;box-shadow:0 4px 34px var(--orgg),inset 0 1px 0 rgba(255,255,255,.16);margin-top:14px;position:relative;overflow:hidden}
.sbtn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.13),transparent 55%)}
.sbtn:hover{transform:translateY(-2px);box-shadow:0 10px 46px var(--orgg)}
.sbtn:active{transform:translateY(0)}

/* ERROR */
.err{background:var(--reg);border:1px solid rgba(255,61,107,.25);border-radius:13px;padding:14px 18px;color:var(--re);font-size:14px;font-weight:500;margin-bottom:20px;animation:up .4s both}

/* ════ RESULTS ════ */
.rw{animation:up .65s cubic-bezier(.16,1,.3,1) both}

/* Hero */
.hero{overflow:hidden;margin-bottom:14px;box-shadow:0 40px 100px rgba(0,0,0,.58)}
.hero-top{padding:38px 38px 32px;background:linear-gradient(135deg,rgba(255,92,26,.07),transparent 55%);border-bottom:1px solid var(--b1);display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.h-tag{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--tx3);margin-bottom:10px}
.h-num{font-family:'Space Grotesk',sans-serif;font-size:clamp(62px,13vw,100px);font-weight:800;line-height:1;background:linear-gradient(135deg,#ff5c1a,#ffb347);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 44px rgba(255,92,26,.3))}
.h-unit{font-size:13px;color:var(--tx2);margin-top:5px;font-weight:500}
.h-badge{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:999px;background:var(--org);border:1px solid rgba(255,92,26,.22);color:var(--or);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}

/* Macros */
.macs{display:grid;grid-template-columns:repeat(3,1fr)}
.mc{padding:24px 16px;text-align:center;border-right:1px solid var(--b1);position:relative}
.mc:last-child{border-right:none}
.mc::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:44px;height:3px;border-radius:0 0 3px 3px}
.mp::before{background:var(--bl)} .mc2::before{background:var(--gr)} .mf::before{background:var(--ye)}
.mn{font-family:'Space Grotesk',sans-serif;font-size:42px;font-weight:800;line-height:1;margin-top:10px}
.mp .mn{color:var(--bl)} .mc2 .mn{color:var(--gr)} .mf .mn{color:var(--ye)}
.mu{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px}
.ml{font-size:10px;color:var(--tx2);font-weight:600;margin-top:7px;letter-spacing:2px;text-transform:uppercase}

/* Maintain */
.main-c{padding:48px;text-align:center;margin-bottom:14px;box-shadow:0 36px 90px rgba(0,0,0,.55)}
.main-lbl{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--tx3);margin-bottom:10px}
.main-num{font-family:'Space Grotesk',sans-serif;font-size:clamp(70px,14vw,108px);font-weight:800;line-height:1;background:linear-gradient(135deg,var(--bl),var(--gr));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.main-sub{font-size:13px;color:var(--tx2);margin-top:8px}

/* Goal rows */
.gc{overflow:hidden;margin-bottom:14px;box-shadow:0 20px 56px rgba(0,0,0,.4)}
.gc-hd{padding:16px 26px;border-bottom:1px solid var(--b1);font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--tx3)}
.gr{padding:18px 26px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:14px;transition:background .15s}
.gr:last-child{border-bottom:none}
.gr:hover{background:rgba(255,255,255,.012)}
.gr-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.gr-info{flex:1;min-width:0}
.gr-name{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700}
.gr-desc{font-size:11px;color:var(--tx2);margin-top:3px}
.gr-right{text-align:right;flex-shrink:0}
.gr-cal{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:800;line-height:1}
.gr-unit{font-size:11px;color:var(--tx3);margin-top:2px}
.bar-w{padding:0 26px 16px}
.bar-t{height:3px;background:var(--c3);border-radius:3px;overflow:hidden}
.bar-f{height:100%;border-radius:3px;transition:width 1.1s cubic-bezier(.16,1,.3,1)}

/* STEPS ON RESULT PAGE */
.res-steps{margin-bottom:14px;overflow:hidden}
.rs-hd{padding:18px 26px;border-bottom:1px solid var(--b1);font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
.rs-body{display:grid;grid-template-columns:repeat(3,1fr)}
.rs-col{padding:22px 14px;text-align:center;border-right:1px solid var(--b1);position:relative;overflow:hidden}
.rs-col:last-child{border-right:none}
.rs-col::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.rs1::before{background:linear-gradient(90deg,var(--bl),transparent)}
.rs2::before{background:linear-gradient(90deg,var(--gr),transparent)}
.rs3::before{background:linear-gradient(90deg,var(--or),transparent)}
.rs-lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.rs-cal{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:800;line-height:1}
.rs1 .rs-cal{color:var(--bl)}.rs2 .rs-cal{color:var(--gr)}.rs3 .rs-cal{color:var(--or)}
.rs-u{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.rs-d{font-size:12px;color:var(--tx2);font-weight:600;margin-top:10px;padding-top:10px;border-top:1px solid var(--b1)}

/* SMART TIP on result page */
.smart-tip{padding:20px 24px;margin-bottom:14px;display:flex;align-items:flex-start;gap:14px}
.st-icon{font-size:26px;flex-shrink:0}
.st-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:800;margin-bottom:5px}
.st-body{font-size:13px;color:var(--tx2);line-height:1.65}
.st-body strong{color:var(--tx);font-weight:600}

/* Reset */
.rbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;background:var(--c2);border:1.5px solid var(--b1);border-radius:15px;color:var(--tx2);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:4px;text-decoration:none}
.rbtn:hover{border-color:var(--or);color:var(--or);background:var(--org)}

/* ════ INFO SECTION ════ */
.info{margin-top:88px}
.inf-hd{text-align:center;margin-bottom:44px}
.inf-hd h2{font-family:'Space Grotesk',sans-serif;font-size:clamp(30px,6vw,46px);font-weight:800;letter-spacing:-1.5px}
.inf-hd h2 em{color:var(--or);font-style:normal}
.inf-hd p{font-size:14px;color:var(--tx2);margin-top:8px}

/* Articles */
.ag{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.ac{padding:26px;transition:border-color .2s}
.ac:hover{border-color:var(--b2)}
.ai{font-size:26px;margin-bottom:13px}
.at{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:800;margin-bottom:9px}
.ab{font-size:13px;color:var(--tx2);line-height:1.72}
.ab strong{color:var(--tx);font-weight:600}

/* Food table */
.ftw{overflow:hidden;margin-bottom:12px}
.ft-hd{padding:18px 24px;border-bottom:1px solid var(--b1);font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:800;display:flex;align-items:center;gap:8px}
.ft-hd em{color:var(--or);font-style:normal}
table{width:100%;border-collapse:collapse}
thead th{padding:9px 16px;text-align:left;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);background:var(--c2);border-bottom:1px solid var(--b1)}
tbody td{padding:11px 16px;font-size:13px;border-bottom:1px solid rgba(26,32,56,.7);color:var(--tx2)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.01)}
.tn{color:var(--tx);font-weight:500}
.tc{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:800;color:var(--or)}
.tk{color:var(--tx3);font-size:11px}
.cat td{padding:8px 16px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.cfr td{color:var(--gr);background:rgba(0,214,143,.04)}
.cve td{color:var(--bl);background:rgba(77,143,255,.04)}
.cpr td{color:var(--or);background:rgba(255,92,26,.04)}
.cgr td{color:var(--ye);background:rgba(255,190,11,.04)}
.csn td{color:var(--pu);background:rgba(168,85,247,.04)}
.cbv td{color:var(--tx2);background:rgba(255,255,255,.02)}

/* Tip */
.tip{background:linear-gradient(135deg,var(--grg),var(--blg));border:1px solid rgba(0,214,143,.16);border-radius:20px;padding:22px 26px;margin-bottom:12px;display:flex;gap:16px;align-items:flex-start}
.tip-i{font-size:28px;flex-shrink:0}
.tip h4{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:800;margin-bottom:5px}
.tip p{font-size:13px;color:var(--tx2);line-height:1.65}
.tip p strong{color:var(--tx);font-weight:600}

/* Steps on info page */
.sc{padding:32px;margin-bottom:12px}
.sc h3{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:800;margin-bottom:5px}
.sc p{font-size:13px;color:var(--tx2);margin-bottom:22px;line-height:1.6}
.sr{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.sb2{background:var(--c2);border:1.5px solid var(--b1);border-radius:16px;padding:20px 12px;text-align:center;position:relative;overflow:hidden;transition:border-color .2s}
.sb2::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.s1::before{background:linear-gradient(90deg,var(--bl),transparent)}
.s2::before{background:linear-gradient(90deg,var(--gr),transparent)}
.s3::before{background:linear-gradient(90deg,var(--or),transparent)}
.sb2:hover{border-color:var(--b2)}
.sl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.scal{font-family:'Space Grotesk',sans-serif;font-size:38px;font-weight:800;line-height:1}
.s1 .scal{color:var(--bl)}.s2 .scal{color:var(--gr)}.s3 .scal{color:var(--or)}
.su{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.sd{font-size:12px;color:var(--tx2);font-weight:600;margin-top:10px;padding-top:10px;border-top:1px solid var(--b1)}

/* FEEDBACK SECTION */
.fb-sec{margin-top:80px}
.fb-sec-hd{text-align:center;margin-bottom:36px}
.fb-sec-hd h2{font-family:'Space Grotesk',sans-serif;font-size:clamp(26px,5vw,38px);font-weight:800;letter-spacing:-1px}
.fb-sec-hd h2 em{color:var(--or);font-style:normal}
.fb-sec-hd p{font-size:13px;color:var(--tx2);margin-top:7px}
.fb-card{padding:36px;box-shadow:0 24px 70px rgba(0,0,0,.4)}
.fb-f{margin-bottom:18px}
.fb-lbl{display:block;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.fb-inp{width:100%;background:var(--c2);border:1.5px solid var(--b1);border-radius:12px;color:var(--tx);font-family:'Inter',sans-serif;font-size:16px;font-weight:400;padding:13px 16px;outline:none;transition:all .2s}
.fb-inp::placeholder{color:var(--tx3)}
.fb-inp:focus{border-color:var(--or);background:var(--c3);box-shadow:0 0 0 4px var(--org)}
textarea.fb-inp{resize:vertical;min-height:100px;line-height:1.6}
.stars2{display:flex;gap:4px;flex-direction:row-reverse;justify-content:flex-end}
.stars2 input{display:none}
.stars2 label{font-size:34px;cursor:pointer;color:var(--b2);transition:color .12s;line-height:1}
.stars2 input:checked~label,.stars2 label:hover,.stars2 label:hover~label{color:var(--ye)}
.fb-btn{width:100%;padding:17px;background:linear-gradient(135deg,var(--or),#df3f0e);border:none;border-radius:14px;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:800;color:#fff;cursor:pointer;transition:all .22s;box-shadow:0 4px 28px var(--orgg);margin-top:6px;position:relative;overflow:hidden}
.fb-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12),transparent 55%)}
.fb-btn:hover{transform:translateY(-2px)}

/* Footer */
.footer{text-align:center;margin-top:60px;padding-top:22px;border-top:1px solid var(--b1);font-size:12px;color:var(--tx3);letter-spacing:.4px}
.footer a{color:var(--or);text-decoration:none;font-weight:600}

@keyframes up{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

/* MOBILE */

  .card{padding:22px}
  .g2{grid-template-columns:1fr}
  .og2{grid-template-columns:1fr 1fr}
  .og3{grid-template-columns:1fr 1fr 1fr}
  .og6{grid-template-columns:1fr 1fr}
  .macs{grid-template-columns:1fr}
  .mc{border-right:none;border-bottom:1px solid var(--b1)}
  .mc:last-child{border-bottom:none}
  .rs-body{grid-template-columns:1fr}
  .rs-col{border-right:none;border-bottom:1px solid var(--b1)}
  .rs-col:last-child{border-bottom:none}
  .hero-top{padding:24px;flex-direction:column;align-items:flex-start}
  .h-num{font-size:clamp(58px,18vw,80px)}
  .sr{grid-template-columns:1fr}
  .ag{grid-template-columns:1fr}
  .gr{flex-wrap:wrap;gap:10px}
  .gr-right{width:100%;text-align:left}
  .pills{flex-wrap:wrap}
  .fb-card{padding:22px}
}

/* SWITCH CARD */
.switch-card{padding:18px 24px;margin-bottom:14px;display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,rgba(77,143,255,.06),rgba(0,214,143,.04));flex-wrap:wrap}
.sw-icon{font-size:28px;flex-shrink:0}
.sw-info{flex:1;min-width:0}
.sw-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin-bottom:3px}
.sw-sub{font-size:12px;color:var(--tx2);line-height:1.5}
.sw-btn{padding:10px 20px;background:linear-gradient(135deg,var(--bl),#3a6fd8);border-radius:10px;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;text-decoration:none;white-space:nowrap;transition:all .2s;box-shadow:0 3px 14px rgba(77,143,255,.28);flex-shrink:0}
.sw-btn:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(77,143,255,.4)}

/* LOGO LINK */

.logo-white{color:#ffffff;-webkit-text-fill-color:#ffffff;filter:drop-shadow(0 0 30px rgba(255,255,255,.15))}

.logo-link{text-decoration:none;display:inline-block;transition:opacity .2s}
.logo-link:hover{opacity:.85}

input[type=number]::placeholder{color:var(--tx3);font-size:18px;font-weight:500}
</style>
</head>
