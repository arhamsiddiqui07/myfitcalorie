<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#05060e"/>
<title>Meal Planner — My Fit Calorie</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05060e;--c2:#0c0f1d;--c3:#111526;
  --b1:#1a2038;--b2:#242d4a;
  --or:#ff5c1a;--org:rgba(255,92,26,.14);--orgg:rgba(255,92,26,.28);
  --bl:#4d8fff;--blg:rgba(77,143,255,.14);
  --gr:#00d68f;--grg:rgba(0,214,143,.14);
  --ye:#ffbe0b;--yeg:rgba(255,190,11,.14);
  --re:#ff3d6b;--reg:rgba(255,61,107,.14);
  --pu:#a855f7;--pug:rgba(168,85,247,.14);
  --tx:#f0f2ff;--tx2:#7a86a0;--tx3:#38445a;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

.bg-wrap{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px)}
.o1{width:700px;height:700px;background:radial-gradient(circle,rgba(0,214,143,.08),transparent 70%);top:-250px;right:-180px;animation:fl1 16s ease-in-out infinite}
.o2{width:550px;height:550px;background:radial-gradient(circle,rgba(255,92,26,.07),transparent 70%);bottom:-180px;left:-180px;animation:fl2 21s ease-in-out infinite}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.011) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.011) 1px,transparent 1px);background-size:56px 56px}
@keyframes fl1{0%,100%{transform:translate(0,0)}50%{transform:translate(-44px,32px) scale(1.09)}}
@keyframes fl2{0%,100%{transform:translate(0,0)}50%{transform:translate(36px,-44px) scale(1.07)}}

.page{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:56px 18px 100px}

.hdr{text-align:center;margin-bottom:44px;animation:up .8s cubic-bezier(.16,1,.3,1) both}
.hdr-pill{display:inline-flex;align-items:center;gap:7px;padding:5px 16px;border-radius:999px;border:1px solid var(--b2);background:var(--c2);font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--tx2);margin-bottom:20px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gr);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.logo-link{text-decoration:none;display:inline-block}
.logo-link h1{font-family:'Outfit',sans-serif;font-size:clamp(50px,11vw,96px);font-weight:900;line-height:.92;letter-spacing:-4px;margin-bottom:16px}
.logo-white{color:#ffffff;-webkit-text-fill-color:#ffffff}
.fire{background:linear-gradient(135deg,#ff5c1a,#ffaa5c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr p{font-size:15px;color:var(--tx2);line-height:1.65;max-width:420px;margin:0 auto}

.nav{display:flex;gap:6px;margin-bottom:14px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px;animation:up .6s cubic-bezier(.16,1,.3,1) .07s both}.nav::-webkit-scrollbar{display:none}
.nav a{padding:10px 16px;border-radius:12px;font-size:13px;font-weight:600;color:var(--tx2);text-decoration:none;border:1px solid transparent;transition:all .2s;white-space:nowrap;flex-shrink:0}
.nav a:hover{color:var(--tx);border-color:var(--b1)}
.nav a.on{background:var(--c2);border-color:var(--b2);color:var(--gr)}

.glass{background:linear-gradient(145deg,rgba(255,255,255,.027),rgba(255,255,255,.008));border:1px solid var(--b1);border-radius:26px;position:relative;overflow:hidden}
.glass::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}
.card{padding:38px;margin-bottom:14px;box-shadow:0 36px 90px rgba(0,0,0,.52);animation:up .65s cubic-bezier(.16,1,.3,1) .1s both}

.sec-plain{display:flex;align-items:center;gap:10px;margin-bottom:15px}
.sec-label{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gr);display:flex;align-items:center;gap:10px}
.sec-label::after{display:none}
.blk{margin-bottom:28px}

.fi{display:flex;flex-direction:column;gap:7px}
.fi label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3)}
.iw{position:relative}
.iw .sf{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;font-weight:700;color:var(--tx3);pointer-events:none;font-family:'Space Grotesk',sans-serif}
input[type=number]{width:100%;background:var(--c2);border:1.5px solid var(--b1);border-radius:13px;color:var(--tx);font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;padding:14px 50px 14px 16px;outline:none;transition:all .2s}
input[type=number]:focus{border-color:var(--gr);background:var(--c3);box-shadow:0 0 0 3px rgba(0,214,143,.1)}

/* Goal cards */
.og2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.op input{display:none}
.op label{display:flex;flex-direction:column;padding:20px;background:var(--c2);border:1.5px solid var(--b1);border-radius:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;align-items:center;text-align:center}
.op label::after{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s}
.loss input:checked+label{border-color:var(--or);box-shadow:0 0 0 1px var(--or),0 6px 24px var(--org)}
.loss input:checked+label::after{background:linear-gradient(135deg,var(--org),transparent);opacity:1}
.gain input:checked+label{border-color:var(--bl);box-shadow:0 0 0 1px var(--bl),0 6px 24px var(--blg)}
.gain input:checked+label::after{background:linear-gradient(135deg,var(--blg),transparent);opacity:1}
.oi{font-size:32px;margin-bottom:10px;position:relative;z-index:1}
.ot{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:800;color:var(--tx);position:relative;z-index:1}
.os{font-size:12px;color:var(--tx2);margin-top:4px;position:relative;z-index:1}
.loss input:checked+label .ot{color:var(--or)}
.gain input:checked+label .ot{color:var(--bl)}

.sbtn{width:100%;padding:19px;background:linear-gradient(135deg,var(--gr),#00a86b);border:none;border-radius:15px;font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:800;color:#fff;cursor:pointer;transition:all .24s;box-shadow:0 4px 34px var(--grg),inset 0 1px 0 rgba(255,255,255,.16);margin-top:14px;position:relative;overflow:hidden}
.sbtn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.13),transparent 55%)}
.sbtn:hover{transform:translateY(-2px)}
.err{background:var(--reg);border:1px solid rgba(255,61,107,.25);border-radius:13px;padding:14px 18px;color:var(--re);font-size:14px;font-weight:500;margin-bottom:20px;animation:up .4s both}

/* ═══ RESULTS ═══ */
.rw{animation:up .65s cubic-bezier(.16,1,.3,1) both}

/* Stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);overflow:hidden;margin-bottom:14px;box-shadow:0 20px 56px rgba(0,0,0,.4)}
.stat{padding:22px 16px;text-align:center;border-right:1px solid var(--b1);position:relative}
.stat:last-child{border-right:none}
.stat::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:44px;height:3px;border-radius:0 0 3px 3px}
.s-kcal::before{background:var(--or)} .s-goal::before{background:var(--gr)} .s-meals::before{background:var(--bl)}
.stat-n{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:800;line-height:1;margin-top:8px}
.s-kcal .stat-n{color:var(--or)} .s-goal .stat-n{color:var(--gr)} .s-meals .stat-n{color:var(--bl)}
.stat-l{font-size:10px;color:var(--tx2);font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-top:4px}

/* Meal card */
.meal-card{overflow:hidden;margin-bottom:12px;box-shadow:0 16px 48px rgba(0,0,0,.35)}
.meal-hd{padding:16px 24px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.meal-hd-left{display:flex;align-items:center;gap:10px}
.meal-icon{font-size:22px}
.meal-name{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:800}
.meal-time{font-size:11px;color:var(--tx3);margin-top:2px}
.meal-kcal{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:800;color:var(--or)}
.meal-kcal span{font-size:11px;color:var(--tx3);font-weight:500;font-family:'Inter',sans-serif}

/* Food items */
.food-item{padding:12px 24px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;transition:background .15s}
.food-item:last-child{border-bottom:none}
.food-item:hover{background:rgba(255,255,255,.01)}
.food-em{font-size:18px;margin-right:10px;flex-shrink:0}
.food-info{flex:1}
.food-name{font-size:14px;font-weight:600;color:var(--tx)}
.food-portion{font-size:11px;color:var(--tx2);margin-top:2px}
.food-right{text-align:right;flex-shrink:0}
.food-cal{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:800;color:var(--or);line-height:1}
.food-macro{font-size:10px;color:var(--tx3);margin-top:2px}

/* Total tip */
.total-tip{padding:20px 24px;margin-bottom:14px;display:flex;align-items:flex-start;gap:14px}
.tt-icon{font-size:26px;flex-shrink:0}
.tt-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:800;margin-bottom:5px}
.tt-body{font-size:13px;color:var(--tx2);line-height:1.65}
.tt-body strong{color:var(--tx);font-weight:600}

.rbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;background:var(--c2);border:1.5px solid var(--b1);border-radius:15px;color:var(--tx2);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:4px;text-decoration:none}
.rbtn:hover{border-color:var(--gr);color:var(--gr);background:var(--grg)}

.footer{text-align:center;margin-top:60px;padding-top:22px;border-top:1px solid var(--b1);font-size:12px;color:var(--tx3)}
.footer a{color:var(--or);text-decoration:none;font-weight:600}
@keyframes up{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}


  .card{padding:22px}
  .og2{grid-template-columns:1fr 1fr}
  .stats-bar{grid-template-columns:1fr}
  .stat{border-right:none;border-bottom:1px solid var(--b1)}
  .stat:last-child{border-bottom:none}
  .meal-hd{flex-wrap:wrap;gap:8px}
}

.meals-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
</style>
</head>
<body>
<p style="color:white">Loading...</p>
</body>
</html>
