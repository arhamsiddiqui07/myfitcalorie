<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#05060e"/>
<title>Body Type Calculator — My Fit Calorie</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05060e;--c2:#0c0f1d;--c3:#111526;
  --b1:#1a2038;--b2:#242d4a;
  --or:#ff5c1a;--org:rgba(255,92,26,.14);--orgg:rgba(255,92,26,.28);
  --bl:#4d8fff;--blg:rgba(77,143,255,.14);--blgg:rgba(77,143,255,.28);
  --gr:#00d68f;--grg:rgba(0,214,143,.14);
  --ye:#ffbe0b;--yeg:rgba(255,190,11,.14);
  --re:#ff3d6b;--reg:rgba(255,61,107,.14);
  --tx:#f0f2ff;--tx2:#7a86a0;--tx3:#38445a;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

.bg-wrap{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px)}
.o1{width:700px;height:700px;background:radial-gradient(circle,rgba(77,143,255,.09),transparent 70%);top:-250px;right:-180px;animation:fl1 16s ease-in-out infinite}
.o2{width:550px;height:550px;background:radial-gradient(circle,rgba(255,92,26,.07),transparent 70%);bottom:-180px;left:-180px;animation:fl2 21s ease-in-out infinite}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.011) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.011) 1px,transparent 1px);background-size:56px 56px}
@keyframes fl1{0%,100%{transform:translate(0,0)}50%{transform:translate(-44px,32px) scale(1.09)}}
@keyframes fl2{0%,100%{transform:translate(0,0)}50%{transform:translate(36px,-44px) scale(1.07)}}

.page{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:56px 18px 100px}

.hdr{text-align:center;margin-bottom:48px;animation:up .8s cubic-bezier(.16,1,.3,1) both}
.hdr-pill{display:inline-flex;align-items:center;gap:7px;padding:5px 16px;border-radius:999px;border:1px solid var(--b2);background:var(--c2);font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--tx2);margin-bottom:20px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--bl);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.logo-link{text-decoration:none;display:inline-block;transition:opacity .2s}
.logo-link h1{font-family:'Outfit',sans-serif;font-size:clamp(50px,11vw,96px);font-weight:900;line-height:.92;letter-spacing:-4px;margin-bottom:16px}
.logo-white{color:#ffffff;-webkit-text-fill-color:#ffffff}
.fire{background:linear-gradient(135deg,#ff5c1a,#ffaa5c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr p{font-size:15px;color:var(--tx2);line-height:1.65;max-width:420px;margin:0 auto}

.nav{display:flex;gap:6px;margin-bottom:14px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px;animation:up .6s cubic-bezier(.16,1,.3,1) .07s both}.nav::-webkit-scrollbar{display:none}
.nav a{padding:10px 16px;border-radius:12px;font-size:13px;font-weight:600;color:var(--tx2);text-decoration:none;border:1px solid transparent;transition:all .2s;white-space:nowrap;flex-shrink:0}
.nav a:hover{color:var(--tx);border-color:var(--b1)}
.nav a.on{background:var(--c2);border-color:var(--b2);color:var(--bl)}

.glass{background:linear-gradient(145deg,rgba(255,255,255,.027),rgba(255,255,255,.008));border:1px solid var(--b1);border-radius:26px;position:relative;overflow:hidden}
.glass::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}
.card{padding:38px;margin-bottom:14px;box-shadow:0 36px 90px rgba(0,0,0,.52);animation:up .65s cubic-bezier(.16,1,.3,1) .1s both}

.sec-plain{display:flex;align-items:center;gap:10px;margin-bottom:15px}
.sec-label{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--bl);display:flex;align-items:center;gap:10px}
.sec-label::after{display:none}
.blk{margin-bottom:28px}

.pills{display:inline-flex;background:var(--c2);border:1px solid var(--b1);border-radius:13px;padding:4px;gap:3px;margin-bottom:14px;flex-wrap:wrap}
.pi input{display:none}
.pi label{display:block;padding:9px 20px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--tx2);transition:all .2s;white-space:nowrap}
.pi input:checked+label{background:var(--bl);color:#fff;box-shadow:0 2px 16px var(--blgg)}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fi{display:flex;flex-direction:column;gap:7px}
.fi label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3)}
.iw{position:relative}
.iw .sf{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;font-weight:700;color:var(--tx3);pointer-events:none;font-family:'Space Grotesk',sans-serif}
input[type=number]{width:100%;background:var(--c2);border:1.5px solid var(--b1);border-radius:13px;color:var(--tx);font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;padding:14px 50px 14px 16px;outline:none;transition:all .2s}
input[type=number]:focus{border-color:var(--bl);background:var(--c3);box-shadow:0 0 0 3px rgba(77,143,255,.1)}
.hide{display:none}.sg{display:grid}.sb{display:block}

.sbtn{width:100%;padding:19px;background:linear-gradient(135deg,var(--bl),#3a6fd8);border:none;border-radius:15px;font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:800;color:#fff;cursor:pointer;transition:all .24s;box-shadow:0 4px 34px var(--blgg),inset 0 1px 0 rgba(255,255,255,.16);margin-top:14px;position:relative;overflow:hidden}
.sbtn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.13),transparent 55%)}
.sbtn:hover{transform:translateY(-2px);box-shadow:0 10px 46px var(--blgg)}

.err{background:var(--reg);border:1px solid rgba(255,61,107,.25);border-radius:13px;padding:14px 18px;color:var(--re);font-size:14px;font-weight:500;margin-bottom:20px;animation:up .4s both}

/* RESULTS */
.rw{animation:up .65s cubic-bezier(.16,1,.3,1) both}

.result-hero{overflow:hidden;margin-bottom:14px;box-shadow:0 40px 100px rgba(0,0,0,.58)}
.rh-top{padding:38px;border-bottom:1px solid var(--b1);text-align:center}
.rh-icon{font-size:72px;margin-bottom:16px}
.rh-tag{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--tx3);margin-bottom:10px}
.rh-name{font-family:'Outfit',sans-serif;font-size:clamp(42px,10vw,72px);font-weight:900;line-height:1;letter-spacing:-2px;margin-bottom:10px}
.rh-sub{font-size:14px;color:var(--tx2);line-height:1.6;max-width:380px;margin:0 auto}

.ec .rh-name{background:linear-gradient(135deg,var(--bl),#a0c4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ms .rh-name{background:linear-gradient(135deg,var(--gr),#a0ffd6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.en .rh-name{background:linear-gradient(135deg,var(--or),#ffb347);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.ec .rh-top{background:linear-gradient(135deg,rgba(77,143,255,.07),transparent)}
.ms .rh-top{background:linear-gradient(135deg,rgba(0,214,143,.07),transparent)}
.en .rh-top{background:linear-gradient(135deg,rgba(255,92,26,.07),transparent)}

/* Traits */
.traits{display:grid;grid-template-columns:repeat(3,1fr)}
.tr{padding:20px 14px;text-align:center;border-right:1px solid var(--b1)}
.tr:last-child{border-right:none}
.tr-icon{font-size:22px;margin-bottom:8px}
.tr-val{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:800;margin-bottom:3px}
.tr-lbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:1.5px}
.ec .tr-val{color:var(--bl)} .ms .tr-val{color:var(--gr)} .en .tr-val{color:var(--or)}

/* Info card */
.info-card{padding:24px 26px;margin-bottom:14px}
.ic-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ic-body{font-size:13px;color:var(--tx2);line-height:1.72}
.ic-body strong{color:var(--tx);font-weight:600}

.rbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;background:var(--c2);border:1.5px solid var(--b1);border-radius:15px;color:var(--tx2);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:4px;text-decoration:none}
.rbtn:hover{border-color:var(--bl);color:var(--bl);background:var(--blg)}

.footer{text-align:center;margin-top:60px;padding-top:22px;border-top:1px solid var(--b1);font-size:12px;color:var(--tx3)}
.footer a{color:var(--or);text-decoration:none;font-weight:600}
@keyframes up{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}


  .card{padding:22px}
  .g2{grid-template-columns:1fr}
  .traits{grid-template-columns:1fr}
  .tr{border-right:none;border-bottom:1px solid var(--b1)}
  .tr:last-child{border-bottom:none}
}
